version: '3.8'

services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Prevents local node_modules from overwriting container node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with Hot Module Replacement on some Windows setups
    restart: always
